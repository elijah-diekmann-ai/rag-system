<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG System</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Ingestion Modal Overlay -->
    <div id="ingest-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2>Memory</h2>
                <span id="close-modal" class="close-btn">&times;</span>
            </div>
            <form id="ingest-form">
                <div class="drop-zone" id="drop-zone">
                    <p>Drop Document (PDF) here</p>
                    <input type="file" id="file-input" name="file" accept=".pdf" required style="display: none;">
                </div>
                <div class="file-name" id="file-name-display"></div>
                
                <div class="form-group">
                    <input type="text" name="company" placeholder="Collection Name (e.g. Company, Topic)" required class="glass-input">
                </div>
                <div class="form-group">
                    <input type="text" name="sector" placeholder="Sector (Optional)" class="glass-input">
                </div>
                <div class="form-group">
                    <input type="text" name="stage" placeholder="Stage (Optional)" class="glass-input">
                </div>
                <div class="form-group">
                    <input type="text" name="owner" placeholder="Owner (e.g. User Name)" value="general" class="glass-input">
                </div>
                
                <button type="submit" class="glass-btn">Ingest</button>
            </form>
            <div id="ingest-status" class="status-display hidden">
                <div class="spinner"></div>
                <p id="status-text">Processing...</p>
            </div>
        </div>
    </div>

    <!-- Main Interface -->
    <div class="horizon-container">
        <!-- Chat History Area -->
        <div id="chat-history" class="chat-history"></div>

        <!-- Chat Input Interface (The Brain) -->
        <div class="chat-interface">
            <div class="input-wrapper">
                <div class="glass-bar">
                    <input type="text" id="query-input" placeholder="Ask anything..." autocomplete="off">
                    <div id="ingest-trigger" class="upload-icon" title="Upload Document">
                         <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
